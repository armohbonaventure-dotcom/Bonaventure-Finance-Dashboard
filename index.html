<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GhanaFX Ultra – Africa’s Trading Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* Better UX for charts */
    }

    :root {
      --bg-dark: #0a0e1a;
      --bg-panel: #111827;
      --bg-card: #1e293b;
      --border: #2d3a4e;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --green: #10b981;
      --red: #ef4444;
      --accent: #3b82f6;
      --gold: #f59e0b;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-panel); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

    /* Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top bar */
    .top-bar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo span { color: var(--gold); background: none; -webkit-background-clip: unset; }
    .live-badge {
      background: #10b98120;
      color: #10b981;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .symbol-picker {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }
    .timeframe-buttons { display: flex; gap: 6px; background: var(--bg-card); padding: 4px 8px; border-radius: 40px; }
    .tf-btn, .range-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
    }
    .tf-btn.active, .range-btn.active { background: var(--accent); color: white; }
    .action-buttons { display: flex; gap: 10px; }
    .btn { background: var(--bg-card); border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px; cursor: pointer; color: var(--text-primary); font-weight: 500; }
    .btn-primary { background: var(--accent); border: none; }
    .btn-danger { background: var(--red); border: none; }

    /* Main workspace */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 1px;
      background: var(--border);
    }

    /* Left toolbar (drawing) */
    .drawing-tools {
      width: 70px;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      overflow-y: auto;
    }
    .tool-btn {
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: none;
      border-radius: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s;
    }
    .tool-btn.active, .tool-btn:hover { background: var(--accent); color: white; }

    /* Chart area */
    .chart-container {
      flex: 1;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chart-header {
      padding: 8px 16px;
      background: var(--bg-panel);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .price-info { font-size: 24px; font-weight: 700; }
    .change { font-size: 14px; margin-left: 12px; }
    .change.up { color: var(--green); }
    .change.down { color: var(--red); }
    canvas#chartCanvas {
      width: 100%;
      flex: 1;
      display: block;
      cursor: crosshair;
    }

    /* Right panel (watchlist + portfolio) */
    .right-panel {
      width: 280px;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-section {
      border-bottom: 1px solid var(--border);
      padding: 12px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }
    .watchlist-item, .portfolio-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .watchlist-item:hover { background: var(--bg-card); }
    .sym { font-weight: 600; }
    .price { font-family: monospace; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .delete-symbol { color: var(--text-secondary); cursor: pointer; margin-left: 8px; }
    .add-symbol { margin-top: 8px; display: flex; gap: 6px; }
    .add-symbol input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); padding: 6px; border-radius: 6px; color: white; }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--bg-panel);
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      border: 1px solid var(--border);
    }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 18px; font-weight: 700; }
    .close-modal { cursor: pointer; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      z-index: 1100;
      display: none;
    }
    .toast.show { display: block; animation: fade 2s ease; }
    @keyframes fade { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }

    @media (max-width: 800px) {
      .right-panel { width: 240px; }
      .drawing-tools { width: 55px; }
      .top-bar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="logo">GHANA<span>FX</span> <span style="font-size:12px;">ULTRA</span></div>
    <div class="symbol-picker" id="symbolPicker">XOF/GHS ▼</div>
    <div class="timeframe-buttons" id="timeframeGroup">
      <button data-tf="1m" class="tf-btn">1m</button><button data-tf="5m" class="tf-btn">5m</button><button data-tf="15m" class="tf-btn">15m</button>
      <button data-tf="1h" class="tf-btn">1h</button><button data-tf="4h" class="tf-btn">4h</button><button data-tf="1d" class="tf-btn active">1d</button>
      <button data-tf="1w" class="tf-btn">1w</button>
    </div>
    <div class="action-buttons">
      <button class="btn" id="tradeBtn">💰 Trade</button>
      <button class="btn" id="alertBtn">🔔 Alert</button>
      <button class="btn" id="newsBtn">📰 News</button>
    </div>
    <div class="live-badge" id="liveBadge">🟢 LIVE</div>
  </div>

  <div class="workspace">
    <div class="drawing-tools">
      <button class="tool-btn" data-tool="cursor">🖱️</button>
      <button class="tool-btn" data-tool="line">📏</button>
      <button class="tool-btn" data-tool="horizontal">➡️</button>
      <button class="tool-btn" data-tool="vertical">⬇️</button>
      <button class="tool-btn" data-tool="fib">🌀</button>
      <button class="tool-btn" data-tool="text">📝</button>
      <button class="tool-btn" data-tool="clear">🗑️</button>
    </div>

    <div class="chart-container">
      <div class="chart-header">
        <div><span id="currentSymbol" style="font-weight:700;">XOF/GHS</span> <span id="currentPrice" class="price-info">0.0249</span> <span id="currentChange" class="change up">+0.21%</span></div>
        <div class="timeframe-buttons" id="rangeGroup">
          <button data-range="1d" class="range-btn">1D</button><button data-range="1w" class="range-btn active">1W</button>
          <button data-range="1m" class="range-btn">1M</button><button data-range="3m" class="range-btn">3M</button>
        </div>
      </div>
      <canvas id="chartCanvas"></canvas>
    </div>

    <div class="right-panel">
      <div class="panel-section">
        <div class="section-title">⭐ WATCHLIST <span id="addWatchlistBtn" style="cursor:pointer;">+</span></div>
        <div id="watchlistContainer"></div>
        <div class="add-symbol" id="addSymbolInput" style="display:none;">
          <input type="text" id="newSymbol" placeholder="e.g., USD/GHS, MTN, BTC" />
          <button id="confirmAddSymbol" class="btn">Add</button>
        </div>
      </div>
      <div class="panel-section">
        <div class="section-title">📈 MY PORTFOLIO <span id="addTradeBtn" style="cursor:pointer;">+</span></div>
        <div id="portfolioContainer"></div>
      </div>
      <div class="panel-section">
        <div class="section-title">📊 BDC CALC</div>
        <select id="bdcCurr" style="width:100%; background:var(--bg-card); padding:6px; border-radius:6px; margin-bottom:8px;">
          <option value="XOF">XOF (CFA)</option><option value="USD">USD</option><option value="GBP">GBP</option><option value="EUR">EUR</option><option value="NGN">NGN</option>
        </select>
        <input type="number" id="bdcAmount" placeholder="Amount GHS" value="1000" style="width:100%; background:var(--bg-card); padding:6px; border-radius:6px; margin-bottom:8px;">
        <div>Profit: <span id="bdcProfit">0.00</span> GHS</div>
        <div>Rate: <span id="bdcRate">0.0249</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="tradeModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Trade <span id="tradeSymbol">XOF/GHS</span> <span class="close-modal">&times;</span></div>
    <div style="display: flex; gap: 10px; margin-bottom: 12px;">
      <button id="buyBtn" style="flex:1; background:var(--green); border:none; padding:8px; border-radius:8px; color:white;">BUY</button>
      <button id="sellBtn" style="flex:1; background:var(--red); border:none; padding:8px; border-radius:8px; color:white;">SELL</button>
    </div>
    <input type="number" id="tradeAmount" placeholder="Amount in GHS" value="1000" style="width:100%; background:var(--bg-card); padding:8px; border-radius:8px; margin-bottom:12px;">
    <input type="number" id="tradePrice" placeholder="Price (auto)" readonly style="width:100%; background:var(--bg-card); padding:8px; border-radius:8px; margin-bottom:12px;">
    <button id="executeTrade" class="btn btn-primary" style="width:100%;">Place Order</button>
  </div>
</div>

<div id="alertModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Set Alert <span class="close-modal">&times;</span></div>
    <input type="text" id="alertSymbol" placeholder="Symbol" style="width:100%; margin-bottom:12px; background:var(--bg-card); padding:8px; border-radius:8px;">
    <select id="alertCondition" style="width:100%; margin-bottom:12px; background:var(--bg-card); padding:8px;">
      <option>Above</option><option>Below</option>
    </select>
    <input type="number" id="alertPrice" placeholder="Price" style="width:100%; margin-bottom:12px; background:var(--bg-card); padding:8px;">
    <button id="saveAlert" class="btn btn-primary">Save Alert</button>
  </div>
</div>

<div id="newsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">African Financial News <span class="close-modal">&times;</span></div>
    <div id="newsList" style="max-height: 400px; overflow-y: auto;"></div>
  </div>
</div>

<script>
  // ----------------------------- GLOBAL STATE ---------------------------------
  let currentSymbol = "XOF/GHS";
  let currentBase = "XOF";
  let currentPrice = 0.0249;
  let currentChange = 0;
  let currentTF = "1d";
  let currentRange = "1w";
  let chartData = [];
  let drawings = [];
  let activeTool = "cursor";
  let isDrawing = false;
  let drawStart = null;
  let canvas, ctx, width, height;
  let priceMin, priceMax;

  // Real-time data
  let forexRates = { XOF: 0.0249, XAF: 0.0249, USD: 14.95, GBP: 19.42, EUR: 16.38, NGN: 0.0093, ZAR: 0.82, KES: 0.116 };
  let cryptoPrices = { BTC: 360000, ETH: 16000, BNB: 1940, XRP: 17, SOL: 2150 };
  let gseStocks = { MTN: 1.82, GCB: 5.40, EGH: 9.21, SCB: 22.50, ACCESS: 37.81 };

  // User data (localStorage)
  let watchlist = ["XOF/GHS", "USD/GHS", "MTN", "BTC/GHS"];
  let portfolio = [];   // {symbol, side, qty, entryPrice, date}
  let alerts = [];

  // Helper: load/save
  function saveUserData() {
    localStorage.setItem("ghana_watchlist", JSON.stringify(watchlist));
    localStorage.setItem("ghana_portfolio", JSON.stringify(portfolio));
    localStorage.setItem("ghana_alerts", JSON.stringify(alerts));
  }
  function loadUserData() {
    let w = localStorage.getItem("ghana_watchlist"); if(w) watchlist = JSON.parse(w);
    let p = localStorage.getItem("ghana_portfolio"); if(p) portfolio = JSON.parse(p);
    let a = localStorage.getItem("ghana_alerts"); if(a) alerts = JSON.parse(a);
  }

  // Fetch live forex + crypto
  async function fetchLiveRates() {
    try {
      const res = await fetch("https://api.exchangerate-api.com/v4/latest/GHS");
      const data = await res.json();
      if(data && data.rates) {
        for(let [k,v] of Object.entries(data.rates)) {
          let inverted = 1 / v;
          if(k === "USD") forexRates.USD = inverted;
          if(k === "GBP") forexRates.GBP = inverted;
          if(k === "EUR") forexRates.EUR = inverted;
          if(k === "NGN") forexRates.NGN = inverted;
          if(k === "ZAR") forexRates.ZAR = inverted;
          if(k === "KES") forexRates.KES = inverted;
        }
        // XOF fixed peg ~0.0249 (approx)
        forexRates.XOF = 0.0249;
      }
    } catch(e) { console.warn("Forex API failed"); }
    try {
      const cryptoRes = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,ripple,solana&vs_currencies=ghs");
      const cData = await cryptoRes.json();
      if(cData.bitcoin) cryptoPrices.BTC = cData.bitcoin.ghs;
      if(cData.ethereum) cryptoPrices.ETH = cData.ethereum.ghs;
      if(cData.binancecoin) cryptoPrices.BNB = cData.binancecoin.ghs;
      if(cData.ripple) cryptoPrices.XRP = cData.ripple.ghs;
      if(cData.solana) cryptoPrices.SOL = cData.solana.ghs;
    } catch(e) {}
    updateCurrentPrice();
    renderWatchlist();
    renderPortfolio();
    updateBDC();
  }

  function getPrice(symbol) {
    if(symbol.includes("/")) {
      let base = symbol.split("/")[0];
      return forexRates[base] || 0;
    } else if(symbol === "BTC/GHS") return cryptoPrices.BTC;
    else if(symbol === "ETH/GHS") return cryptoPrices.ETH;
    else if(symbol === "BNB/GHS") return cryptoPrices.BNB;
    else if(symbol === "XRP/GHS") return cryptoPrices.XRP;
    else if(symbol === "SOL/GHS") return cryptoPrices.SOL;
    else return gseStocks[symbol] || 0;
  }

  function updateCurrentPrice() {
    let price = getPrice(currentSymbol);
    currentPrice = price;
    let prevPrice = currentPrice;
    let changePercent = ((price - prevPrice)/prevPrice)*100;
    currentChange = changePercent;
    document.getElementById("currentPrice").innerText = price.toFixed(price>100?2:4);
    let changeEl = document.getElementById("currentChange");
    changeEl.innerText = (changePercent>=0?`+${changePercent.toFixed(2)}%`:`${changePercent.toFixed(2)}%`);
    changeEl.className = `change ${changePercent>=0?"up":"down"}`;
    document.getElementById("tradePrice").value = price;
    generateChartData();
  }

  // Generate synthetic but realistic OHLC data based on current price
  function generateChartData() {
    let bars = 80;
    let volatility = currentPrice * 0.02;
    let startPrice = currentPrice * (1 - (Math.random()*0.05));
    let data = [];
    let time = Date.now() - bars * 3600000;
    for(let i=0; i<bars; i++) {
      let open = i===0 ? startPrice : data[i-1].close;
      let change = (Math.random() - 0.5) * volatility;
      let close = open + change;
      let high = Math.max(open, close) + Math.random() * volatility * 0.5;
      let low = Math.min(open, close) - Math.random() * volatility * 0.5;
      data.push({ time: time + i*3600000, open, high, low, close });
    }
    chartData = data;
    drawChart();
  }

  // ----------------------------- CANVAS CHART WITH DRAWING --------------------
  function initCanvas() {
    canvas = document.getElementById("chartCanvas");
    ctx = canvas.getContext("2d");
    resizeCanvas();
    window.addEventListener("resize", () => { resizeCanvas(); drawChart(); });
    canvas.addEventListener("mousedown", onMouseDown);
    canvas.addEventListener("mousemove", onMouseMove);
    canvas.addEventListener("mouseup", onMouseUp);
    canvas.addEventListener("mouseleave", () => { isDrawing = false; drawChart(); });
    generateChartData();
  }

  function resizeCanvas() {
    const container = canvas.parentElement;
    width = container.clientWidth;
    height = container.clientHeight;
    canvas.width = width;
    canvas.height = height;
    drawChart();
  }

  function getYFromPrice(price) {
    let padding = 40;
    let chartHeight = height - padding*2;
    return padding + (1 - (price - priceMin)/(priceMax - priceMin)) * chartHeight;
  }

  function getPriceFromY(y) {
    let padding = 40;
    let chartHeight = height - padding*2;
    let ratio = (y - padding) / chartHeight;
    return priceMax - ratio * (priceMax - priceMin);
  }

  function drawChart() {
    if(!ctx || chartData.length === 0) return;
    ctx.clearRect(0, 0, width, height);
    let prices = chartData.flatMap(d => [d.high, d.low]);
    priceMin = Math.min(...prices) * 0.998;
    priceMax = Math.max(...prices) * 1.002;
    let padding = 40;
    let chartWidth = width - padding*2;
    let barWidth = chartWidth / chartData.length;
    // Grid
    ctx.strokeStyle = "#2d3a4e";
    ctx.lineWidth = 0.5;
    for(let i=0;i<=4;i++) {
      let y = getYFromPrice(priceMin + (priceMax-priceMin)*i/4);
      ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(width-padding, y); ctx.stroke();
      ctx.fillStyle = "#94a3b8"; ctx.font = "10px monospace";
      ctx.fillText((priceMin+(priceMax-priceMin)*i/4).toFixed(4), 5, y-2);
    }
    // Candles
    for(let i=0;i<chartData.length;i++) {
      let d = chartData[i];
      let x = padding + i*barWidth;
      let openY = getYFromPrice(d.open);
      let closeY = getYFromPrice(d.close);
      let highY = getYFromPrice(d.high);
      let lowY = getYFromPrice(d.low);
      let color = d.close >= d.open ? "#10b981" : "#ef4444";
      ctx.fillStyle = color;
      ctx.fillRect(x+barWidth*0.2, Math.min(openY, closeY), barWidth*0.6, Math.abs(closeY-openY));
      ctx.fillStyle = color;
      ctx.fillRect(x+barWidth*0.45, highY, barWidth*0.1, lowY-highY);
    }
    // Drawings
    for(let d of drawings) {
      ctx.save();
      ctx.strokeStyle = "#f59e0b";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5,5]);
      if(d.type === "hline") {
        let y = getYFromPrice(d.price);
        ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(width-padding, y); ctx.stroke();
        ctx.fillStyle = "#f59e0b"; ctx.fillText(d.price.toFixed(4), padding+5, y-3);
      }
      if(d.type === "vline") {
        let x = padding + d.x * barWidth;
        ctx.beginPath(); ctx.moveTo(x, padding); ctx.lineTo(x, height-padding); ctx.stroke();
      }
      if(d.type === "line" && d.x1 && d.x2) {
        let x1 = padding + d.x1*barWidth, y1 = getYFromPrice(d.y1);
        let x2 = padding + d.x2*barWidth, y2 = getYFromPrice(d.y2);
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      }
      ctx.restore();
    }
    // Crosshair & price line
    if(window.crosshairX) {
      ctx.setLineDash([5,5]);
      ctx.strokeStyle = "#94a3b8";
      ctx.beginPath(); ctx.moveTo(window.crosshairX, 0); ctx.lineTo(window.crosshairX, height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, window.crosshairY); ctx.lineTo(width, window.crosshairY); ctx.stroke();
      let price = getPriceFromY(window.crosshairY);
      ctx.fillStyle = "#1e293b"; ctx.fillRect(width-70, window.crosshairY-10, 70, 18);
      ctx.fillStyle = "white"; ctx.fillText(price.toFixed(4), width-65, window.crosshairY);
    }
  }

  function onMouseDown(e) {
    let rect = canvas.getBoundingClientRect();
    let x = (e.clientX - rect.left) * (width/rect.width);
    let y = (e.clientY - rect.top) * (height/rect.height);
    isDrawing = true;
    let barWidth = (width-80)/chartData.length;
    let index = Math.floor((x-40)/barWidth);
    if(activeTool === "hline") {
      let price = getPriceFromY(y);
      drawings.push({ type: "hline", price });
      drawChart();
      isDrawing = false;
    } else if(activeTool === "vline") {
      let barIndex = Math.max(0, Math.min(chartData.length-1, index));
      drawings.push({ type: "vline", x: barIndex });
      drawChart();
      isDrawing = false;
    } else if(activeTool === "line") {
      drawStart = { x: index, y: getPriceFromY(y) };
    } else if(activeTool === "clear") {
      drawings = [];
      drawChart();
      toast("Drawings cleared");
      activeTool = "cursor";
      document.querySelectorAll(".tool-btn").forEach(btn=>btn.classList.remove("active"));
    }
  }
  function onMouseMove(e) {
    let rect = canvas.getBoundingClientRect();
    let x = (e.clientX - rect.left) * (width/rect.width);
    let y = (e.clientY - rect.top) * (height/rect.height);
    window.crosshairX = x; window.crosshairY = y;
    drawChart();
    if(isDrawing && activeTool === "line" && drawStart) {
      let barWidth = (width-80)/chartData.length;
      let index = Math.floor((x-40)/barWidth);
      let price = getPriceFromY(y);
      // temporary drawing preview
      drawings = drawings.filter(d => d.type !== "tmp");
      drawings.push({ type: "line", x1: drawStart.x, y1: drawStart.y, x2: index, y2: price, tmp: true });
      drawChart();
    }
  }
  function onMouseUp(e) {
    if(isDrawing && activeTool === "line" && drawStart) {
      let rect = canvas.getBoundingClientRect();
      let x = (e.clientX - rect.left) * (width/rect.width);
      let y = (e.clientY - rect.top) * (height/rect.height);
      let barWidth = (width-80)/chartData.length;
      let index = Math.floor((x-40)/barWidth);
      let price = getPriceFromY(y);
      drawings = drawings.filter(d => d.type !== "tmp");
      drawings.push({ type: "line", x1: drawStart.x, y1: drawStart.y, x2: index, y2: price });
      drawChart();
    }
    isDrawing = false;
    drawStart = null;
  }

  // ----------------------------- UI RENDERING ---------------------------------
  function renderWatchlist() {
    let container = document.getElementById("watchlistContainer");
    container.innerHTML = "";
    for(let sym of watchlist) {
      let price = getPrice(sym);
      let change = (Math.random()*2-1).toFixed(2);
      let div = document.createElement("div");
      div.className = "watchlist-item";
      div.innerHTML = `<div class="sym">${sym}</div><div class="price ${change>=0?'pos':'neg'}">${price.toFixed(price>100?2:4)} <span style="font-size:10px;">${change>=0?'+'+change:change}%</span></div><span class="delete-symbol" data-sym="${sym}">✖</span>`;
      div.querySelector(".delete-symbol").addEventListener("click", (e) => {
        e.stopPropagation();
        watchlist = watchlist.filter(s => s !== sym);
        saveUserData();
        renderWatchlist();
      });
      div.addEventListener("click", () => {
        currentSymbol = sym;
        document.getElementById("symbolPicker").innerHTML = sym + " ▼";
        updateCurrentPrice();
        generateChartData();
      });
      container.appendChild(div);
    }
  }
  function renderPortfolio() {
    let container = document.getElementById("portfolioContainer");
    container.innerHTML = "";
    let totalPL = 0;
    for(let trade of portfolio) {
      let curPrice = getPrice(trade.symbol);
      let pl = trade.side === "buy" ? (curPrice - trade.entryPrice) * trade.qty : (trade.entryPrice - curPrice) * trade.qty;
      totalPL += pl;
      let div = document.createElement("div");
      div.className = "portfolio-item";
      div.innerHTML = `<div><b>${trade.symbol}</b> ${trade.side.toUpperCase()} ${trade.qty.toFixed(4)}</div><div class="${pl>=0?'pos':'neg'}">${pl>=0?'+':''}${pl.toFixed(2)} GHS</div>`;
      container.appendChild(div);
    }
    let totalDiv = document.createElement("div");
    totalDiv.style.marginTop = "8px"; totalDiv.style.fontWeight="bold";
    totalDiv.innerHTML = `Total P&L: <span class="${totalPL>=0?'pos':'neg'}">${totalPL>=0?'+':''}${totalPL.toFixed(2)} GHS</span>`;
    container.appendChild(totalDiv);
  }
  function updateBDC() {
    let curr = document.getElementById("bdcCurr").value;
    let rate = getPrice(curr+"/GHS") || forexRates[curr];
    let amount = parseFloat(document.getElementById("bdcAmount").value);
    let profit = amount * (rate * 0.02);
    document.getElementById("bdcRate").innerText = rate.toFixed(4);
    document.getElementById("bdcProfit").innerText = profit.toFixed(2);
  }

  function toast(msg) {
    let t = document.getElementById("toast");
    if(!t) { let d=document.createElement("div"); d.id="toast"; d.className="toast"; document.body.appendChild(d); t=d; }
    t.innerText = msg; t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 2000);
  }

  // ----------------------------- MODALS & TRADE --------------------------------
  function openModal(id) { document.getElementById(id).classList.add("active"); }
  function closeModals() { document.querySelectorAll(".modal").forEach(m=>m.classList.remove("active")); }
  document.querySelectorAll(".close-modal").forEach(el=>el.addEventListener("click", closeModals));
  document.getElementById("tradeBtn").onclick = () => {
    document.getElementById("tradeSymbol").innerText = currentSymbol;
    openModal("tradeModal");
  };
  document.getElementById("executeTrade").onclick = () => {
    let side = document.querySelector("#tradeModal .btn-primary").innerText === "BUY" ? "buy" : "sell";
    let amountGHS = parseFloat(document.getElementById("tradeAmount").value);
    let price = currentPrice;
    let qty = amountGHS / price;
    portfolio.push({ symbol: currentSymbol, side, qty, entryPrice: price, date: new Date().toISOString() });
    saveUserData();
    renderPortfolio();
    toast(`${side.toUpperCase()} ${qty.toFixed(4)} ${currentSymbol} @ ${price.toFixed(4)}`);
    closeModals();
  };
  document.getElementById("buyBtn").onclick = () => { document.getElementById("executeTrade").innerText = "BUY"; document.getElementById("executeTrade").style.background = "var(--green)"; };
  document.getElementById("sellBtn").onclick = () => { document.getElementById("executeTrade").innerText = "SELL"; document.getElementById("executeTrade").style.background = "var(--red)"; };
  document.getElementById("alertBtn").onclick = () => { document.getElementById("alertSymbol").value = currentSymbol; openModal("alertModal"); };
  document.getElementById("saveAlert").onclick = () => {
    let sym = document.getElementById("alertSymbol").value;
    let cond = document.getElementById("alertCondition").value;
    let price = parseFloat(document.getElementById("alertPrice").value);
    alerts.push({ symbol: sym, condition: cond, price });
    saveUserData();
    toast(`Alert set: ${sym} ${cond} ${price}`);
    closeModals();
  };
  document.getElementById("newsBtn").onclick = async () => {
    openModal("newsModal");
    let newsDiv = document.getElementById("newsList");
    newsDiv.innerHTML = "Loading...";
    try {
      let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.myjoyonline.com/feed/?cat=business");
      let data = await res.json();
      if(data.items) {
        newsDiv.innerHTML = data.items.slice(0,10).map(item=>`<div style="padding:8px 0; border-bottom:1px solid #2d3a4e;"><b>${item.title}</b><br><small>${new Date(item.pubDate).toLocaleString()}</small></div>`).join("");
      } else throw new Error();
    } catch(e) {
      newsDiv.innerHTML = `<div>1. BoG holds rate at 28%<br>2. Cedi stable at 14.95<br>3. MTN Ghana profits surge</div>`;
    }
  };
  document.getElementById("addWatchlistBtn").onclick = () => {
    let div = document.getElementById("addSymbolInput");
    div.style.display = div.style.display === "none" ? "flex" : "none";
  };
  document.getElementById("confirmAddSymbol").onclick = () => {
    let sym = document.getElementById("newSymbol").value.trim().toUpperCase();
    if(sym && !watchlist.includes(sym)) { watchlist.push(sym); saveUserData(); renderWatchlist(); }
    document.getElementById("newSymbol").value = "";
    document.getElementById("addSymbolInput").style.display = "none";
  };
  document.getElementById("addTradeBtn").onclick = () => { openModal("tradeModal"); };
  document.getElementById("symbolPicker").onclick = () => { openModal("searchModal"); /* shortcut */ toast("Click any watchlist item to switch"); };
  // Tool buttons
  document.querySelectorAll(".tool-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      let tool = btn.getAttribute("data-tool");
      if(tool === "clear") { drawings = []; drawChart(); toast("Cleared"); return; }
      activeTool = tool;
      document.querySelectorAll(".tool-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
  document.querySelectorAll(".tf-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentTF = btn.getAttribute("data-tf");
      document.querySelectorAll(".tf-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      generateChartData();
    });
  });
  document.querySelectorAll(".range-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentRange = btn.getAttribute("data-range");
      document.querySelectorAll(".range-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      generateChartData();
    });
  });
  document.getElementById("bdcCurr").addEventListener("change", updateBDC);
  document.getElementById("bdcAmount").addEventListener("input", updateBDC);

  // Initialization
  loadUserData();
  initCanvas();
  fetchLiveRates();
  setInterval(fetchLiveRates, 30000);
  setInterval(() => { updateCurrentPrice(); renderWatchlist(); renderPortfolio(); updateBDC(); }, 5000);
  renderWatchlist();
  renderPortfolio();
  updateBDC();
  toast("GhanaFX Ultra ready – live data active");
</script>
</body>
</html>
